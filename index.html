<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xplore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fff8ef;
      --bg-soft: #fff4e6;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-strong: #ffffff;
      --text: #403128;
      --muted: #7d6858;
      --line: rgba(153, 102, 57, 0.14);
      --accent: #ff7a59;
      --accent-deep: #f05d44;
      --accent-soft: #ffd7b0;
      --gold: #ffbd59;
      --peach: #ffefe1;
      --success: #3f9b68;
      --warning: #d89226;
      --shadow: 0 16px 45px rgba(194, 116, 66, 0.14);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --max-width: 1120px;
      --nav-height: 82px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Inter", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 195, 113, 0.5), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 122, 89, 0.18), transparent 24%),
        linear-gradient(180deg, #fff4df 0%, #fff8ef 22%, #fffaf4 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.18) 25%, transparent 25%) -14px 0 / 28px 28px,
        linear-gradient(225deg, rgba(255,255,255,0.18) 25%, transparent 25%) -14px 0 / 28px 28px;
      opacity: 0.12;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.6), transparent 70%);
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .app-shell {
      max-width: var(--max-width);
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 18px calc(var(--nav-height) + 22px);
      position: relative;
    }

    .hero-orb {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 189, 89, 0.46), rgba(255, 189, 89, 0));
      filter: blur(10px);
      z-index: 0;
      pointer-events: none;
    }

    .hero-orb.left {
      top: -80px;
      left: -40px;
    }

    .hero-orb.right {
      top: 180px;
      right: -80px;
      background: radial-gradient(circle, rgba(255, 122, 89, 0.22), rgba(255, 122, 89, 0));
    }

    .panel {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .welcome-shell {
      min-height: calc(100vh - 40px);
      display: grid;
      align-items: center;
    }

    .welcome-card {
      padding: 28px;
      overflow: hidden;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .logo-mark {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(145deg, #ffbe5c, #ff7a59 60%, #ff5a5f);
      box-shadow: 0 14px 26px rgba(255, 122, 89, 0.35);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .logo-mark::before,
    .logo-mark::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
    }

    .logo-mark::before {
      width: 32px;
      height: 32px;
      bottom: -6px;
      left: -4px;
    }

    .logo-mark::after {
      width: 26px;
      height: 26px;
      top: -6px;
      right: -2px;
      opacity: 0.8;
    }

    .brand-copy h1,
    .app-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .tagline {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .welcome-layout {
      display: grid;
      grid-template-columns: 1.02fr 1.1fr;
      gap: 26px;
      align-items: start;
    }

    .welcome-copy {
      padding: 10px 6px 8px 4px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255, 174, 107, 0.35);
      color: #9a6239;
      font-weight: 600;
      font-size: 0.88rem;
      margin-bottom: 18px;
    }

    .lead {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
      margin: 18px 0 18px;
      max-width: 46ch;
    }

    .feature-list {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .feature-pill {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 16px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 18px;
    }

    .feature-pill strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.96rem;
    }

    .feature-pill span {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .form-card {
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,250,244,0.94)),
        var(--surface-strong);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 190, 147, 0.35);
      box-shadow: 0 14px 28px rgba(192, 123, 68, 0.12);
    }

    .section-title {
      margin: 0 0 6px;
      font-size: 1.15rem;
      letter-spacing: -0.03em;
    }

    .section-subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    .field-group {
      display: grid;
      gap: 8px;
    }

    .field-group label,
    .small-label {
      font-weight: 600;
      font-size: 0.92rem;
    }

    .field-group input,
    .field-group textarea {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fffdf9;
      padding: 14px 16px;
      outline: none;
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .field-group input:focus,
    .field-group textarea:focus {
      border-color: rgba(255, 122, 89, 0.48);
      box-shadow: 0 0 0 4px rgba(255, 122, 89, 0.12);
    }

    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: #fff7f0;
      color: #7f5a44;
      border: 1px solid rgba(255, 185, 116, 0.35);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .chip.active {
      background: linear-gradient(135deg, rgba(255, 190, 92, 0.26), rgba(255, 122, 89, 0.18));
      color: #8a3b2d;
      border-color: rgba(255, 122, 89, 0.4);
      box-shadow: 0 8px 18px rgba(255, 122, 89, 0.12);
    }

    .choice-stack {
      display: grid;
      gap: 10px;
    }

    .choice-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 15px;
      border-radius: 16px;
      border: 1px solid rgba(196, 132, 82, 0.18);
      background: #fffdf9;
      font-weight: 500;
      text-align: left;
    }

    .choice-card.active {
      border-color: rgba(255, 122, 89, 0.36);
      background: linear-gradient(135deg, rgba(255, 244, 236, 1), rgba(255, 233, 220, 1));
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255, 122, 89, 0.4);
      flex-shrink: 0;
      position: relative;
    }

    .choice-card.active .dot::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: var(--accent);
    }

    .api-box {
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 190, 92, 0.16), rgba(255, 122, 89, 0.06));
      border: 1px solid rgba(255, 172, 115, 0.26);
      display: grid;
      gap: 12px;
    }

    .api-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .api-row input {
      flex: 1;
    }

    .api-note {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.5;
      margin: 0;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-primary,
    .btn-secondary,
    .btn-ghost,
    .btn-soft {
      min-height: 48px;
      border-radius: 16px;
      padding: 12px 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--accent), #ff9052);
      box-shadow: 0 14px 24px rgba(255, 122, 89, 0.24);
    }

    .btn-secondary {
      background: #fff;
      border: 1px solid rgba(160, 106, 66, 0.16);
      color: var(--text);
    }

    .btn-soft {
      color: #8c452f;
      background: #fff0e6;
    }

    .btn-ghost {
      color: var(--muted);
      background: transparent;
      border: 1px dashed rgba(155, 108, 71, 0.24);
    }

    .app-view {
      display: grid;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      padding: 20px;
    }

    .topbar h2 {
      margin: 8px 0 4px;
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      max-width: 48ch;
      line-height: 1.55;
    }

    .mini-card {
      padding: 16px 18px;
      min-width: 200px;
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,245,238,0.88));
      border-radius: 20px;
      border: 1px solid rgba(255, 196, 147, 0.3);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .mini-card strong {
      display: block;
      margin-top: 8px;
      font-size: 1.7rem;
      letter-spacing: -0.04em;
    }

    .mini-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #ac6c42;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.78fr);
      gap: 20px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .section-card {
      padding: 20px;
    }

    .section-card h3 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      letter-spacing: -0.03em;
    }

    .section-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .event-list,
    .saved-list,
    .history-list {
      display: grid;
      gap: 16px;
    }

    .event-card {
      overflow: hidden;
      padding: 0;
    }

    .event-top {
      padding: 20px 20px 14px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .event-title {
      margin: 0;
      font-size: 1.18rem;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1.3;
    }

    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .meta-pill,
    .category-pill,
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .category-pill {
      background: rgba(255, 190, 92, 0.18);
      color: #9b5b2d;
    }

    .meta-pill {
      background: #fff7ee;
      color: #7d6556;
      border: 1px solid rgba(180, 129, 90, 0.14);
    }

    .status-pill {
      background: rgba(63, 155, 104, 0.12);
      color: var(--success);
    }

    .cost-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    }

    .cost-pill.free {
      background: rgba(63, 155, 104, 0.14);
      color: #2f8658;
    }

    .cost-pill.paid {
      background: rgba(111, 104, 96, 0.12);
      color: #67584d;
    }

    .event-body {
      padding: 0 20px 18px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .event-footer {
      display: grid;
      gap: 14px;
      padding: 18px 20px 20px;
      background: linear-gradient(180deg, rgba(255,244,235,0.68), rgba(255,255,255,0.9));
      border-top: 1px solid rgba(196, 132, 82, 0.08);
    }

    .match-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-size: 0.92rem;
      color: #795e4b;
    }

    .match-dots {
      letter-spacing: 0.16em;
      color: #ff9357;
      font-size: 1rem;
    }

    .event-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .event-actions button {
      flex: 1 1 140px;
    }

    .event-actions a,
    .saved-actions a {
      flex: 1 1 140px;
    }

    .action-link {
      min-height: 48px;
      border-radius: 16px;
      padding: 12px 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, opacity 0.18s ease;
    }

    .action-link:hover {
      transform: translateY(-1px);
    }

    .btn-map {
      background: #fff5ea;
      color: #8b5637;
      border: 1px solid rgba(188, 130, 86, 0.16);
    }

    .sidebar-card {
      padding: 20px;
    }

    .sidebar-card + .sidebar-card {
      margin-top: 18px;
    }

    .insight-card {
      background:
        linear-gradient(160deg, rgba(255, 189, 89, 0.18), rgba(255,255,255,0.96) 62%),
        var(--surface);
    }

    .tiny-kicker {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 800;
      color: #b17044;
      margin-bottom: 10px;
      display: inline-block;
    }

    .interest-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .interest-badge {
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(190, 133, 88, 0.16);
      color: #7d624f;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      padding: 30px 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,248,239,0.92));
    }

    .empty-state strong {
      display: block;
      margin: 12px 0 8px;
      font-size: 1.05rem;
    }

    .empty-state p {
      color: var(--muted);
      line-height: 1.65;
      max-width: 36ch;
      margin: 0 auto 18px;
    }

    .saved-grid {
      display: grid;
      gap: 16px;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .status-chip {
      padding: 9px 12px;
      border-radius: 999px;
      background: #fff8f0;
      color: #8a694e;
      font-size: 0.84rem;
      font-weight: 700;
      border: 1px solid rgba(194, 132, 83, 0.18);
    }

    .status-chip.active {
      background: linear-gradient(135deg, rgba(255, 190, 92, 0.25), rgba(255, 122, 89, 0.14));
      color: #8a3e2c;
      border-color: rgba(255, 122, 89, 0.3);
    }

    .saved-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .review-card {
      margin-top: 14px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 246, 237, 0.88);
      border: 1px solid rgba(193, 132, 82, 0.14);
    }

    .community-mini {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 248, 240, 0.96), rgba(255, 242, 230, 0.92));
      border: 1px solid rgba(194, 132, 83, 0.14);
    }

    .community-mini strong {
      font-size: 0.98rem;
      letter-spacing: -0.03em;
    }

    .community-mini .helper {
      font-size: 0.82rem;
    }

    .detail-link {
      color: #9a5934;
      background: transparent;
      padding: 0;
      min-height: auto;
      font-weight: 700;
      border-bottom: 1px solid rgba(154, 89, 52, 0.2);
      border-radius: 0;
    }

    .stats-card {
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 250, 244, 0.98), rgba(255, 242, 229, 0.92));
      border: 1px solid rgba(197, 135, 84, 0.18);
      display: grid;
      gap: 14px;
    }

    .stats-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .stats-head h4 {
      margin: 0 0 6px;
      font-size: 1rem;
      letter-spacing: -0.03em;
    }

    .stats-rating {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 189, 89, 0.18);
      color: #9b5d2f;
      font-weight: 800;
      white-space: nowrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stats-box {
      padding: 13px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(190, 133, 88, 0.14);
    }

    .stats-box strong {
      display: block;
      margin-bottom: 5px;
      font-size: 1rem;
      letter-spacing: -0.03em;
    }

    .stats-box span {
      color: var(--muted);
      font-size: 0.87rem;
      line-height: 1.5;
    }

    .stats-snippets {
      display: grid;
      gap: 10px;
    }

    .snippet {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(188, 130, 86, 0.12);
      color: #6f594a;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .privacy-note {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(178, 126, 84, 0.15);
      color: #8a684f;
      font-size: 0.83rem;
      font-weight: 700;
      width: fit-content;
    }

    .stars-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .star-chip {
      padding: 10px 12px;
      border-radius: 999px;
      background: white;
      border: 1px solid rgba(180, 129, 90, 0.18);
      color: var(--text);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .star-chip.active {
      border-color: rgba(255, 122, 89, 0.36);
      background: #fff1e6;
      color: #92402f;
    }

    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(69, 41, 24, 0.24);
      backdrop-filter: blur(10px);
      z-index: 40;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 18px;
    }

    .detail-modal {
      width: min(760px, 100%);
      max-height: calc(100vh - 24px);
      overflow: auto;
      padding: 20px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,248,241,0.98));

      let hash = 2166136261;
      for (let i = 0; i < value.length; i += 1) {
        hash ^= value.charCodeAt(i);
        hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
      }
      return Math.abs(hash >>> 0);
    }

      if (["Art", "Photography", "Cooking", "Film", "Music", "Reading", "Coding"].includes(category)) pool = templates.creative;

    function sanitizePublicSnippet(text) {
      const cleaned = String(text || "").trim().replace(/\s+/g, " ");
      if (!cleaned) return "";
      if (/@|https?:\/\/|www\.|\b\d{3}[-.\s]?\d{3}[-.\s]?\d{4}\b/.test(cleaned)) return "";
      const withoutNumbers = cleaned.replace(/\b\d{1,2}\b/g, "");
      const withoutQuotedNames = withoutNumbers.replace(/\b[A-Z][a-z]{2,}\b/g, "someone");
      return withoutQuotedNames.slice(0, 160).trim();
    }

      }
      if (review.meetPeople === "Somewhat") {

      }
      if (review.recommend === "Yes") {
        return `Worth trying if you like ${event.category.toLowerCase()} events with a little structure and a welcoming crowd.`;

    function createSeedPublicStats(event) {
      const seed = hashString(`${event.id}|${event.name}|${event.venue}`);
      const attendeeCount = seededNumber(seed + 3, 8, 36);
      const avgRating = seededNumber(seed + 5, 38, 49) / 10;
      const metPercent = seededNumber(seed + 7, 54, 89);
      const recommendPercent = Math.max(metPercent, seededNumber(seed + 11, 65, 95));
      const buckets = ["18-21", "22-29", "30-37", "38-45", "46-55"];
      const dominantBucket = buckets[seededNumber(seed + 13, 0, buckets.length - 1)];
      const ageBuckets = {};
      buckets.forEach((bucket, index) => {
        const count = bucket === dominantBucket
          ? Math.max(3, Math.round(attendeeCount * 0.42))
          : seededNumber(seed + 20 + index, 1, Math.max(2, Math.round(attendeeCount * 0.14)));
        ageBuckets[bucket] = count;
      });

      const related = Array.from(new Set([...(event.interestTags || []), ...categoryRelatedInterests(event.category)])).slice(0, 5);
      const interestCounts = {};
      related.forEach((interest, index) => {
        interestCounts[interest] = Math.max(2, seededNumber(seed + 31 + index, 2, Math.round(attendeeCount * 0.52)));
      });

      const snippetPool = buildSnippetPool(event);
      const snippets = [];
      for (let i = 0; i < 4; i += 1) {
        snippets.push(snippetPool[(seededNumber(seed + 41 + i, 0, snippetPool.length - 1) + i) % snippetPool.length]);
      }

      return {
        count: attendeeCount,
        starSum: Math.round(avgRating * attendeeCount * 10) / 10,
        metCount: Math.round(attendeeCount * (metPercent / 100)),
        recommendCount: Math.round(attendeeCount * (recommendPercent / 100)),
        ageBuckets,
        interestCounts,
        snippets
      };
    }

      if (base.includes("los angeles") || base === "la" || base.includes("venice") || base.includes("santa monica")) return "Los Angeles";

      const month = date.toLocaleDateString(undefined, { month: "short" });
      const day = date.getDate();
      return `${weekday}, ${month} ${day} • ${timeText}`;

    function getHardcodedEvents(profile) {
      const fallbackCity = inferFallbackCity(profile.city);
      const sourceEvents = CITY_EVENT_BANK[fallbackCity] || CITY_EVENT_BANK.Austin;
      const preferred = sourceEvents.filter((event) =>
        event.interestTags.some((tag) => profile.interests.includes(tag)) || profile.interests.includes(event.category)
      );
      const pool = [...preferred, ...sourceEvents.filter((event) => !preferred.includes(event))];
      const selected = [];
      const usedNames = new Set();

      pool.forEach((event, index) => {
        if (selected.length >= 12 || usedNames.has(event.name)) return;
        usedNames.add(event.name);
        const offset = 2 + index * 2;
        selected.push(enrichEvent(event, profile, fallbackCity, offset));
      });

      let fillerIndex = 0;
      while (selected.length < 12) {
        const interest = profile.interests[fillerIndex % profile.interests.length] || "Food & Drinks";
        const extra = enrichEvent(createTemplatedEvent(interest, fallbackCity, fillerIndex), profile, fallbackCity, 3 + fillerIndex * 2);
        if (!usedNames.has(extra.name)) {
          usedNames.add(extra.name);
          selected.push(extra);
        }
        fillerIndex += 1;
      }

      return selected;
    }

    function enrichEvent(event, profile, city, offsetDays) {
      const allTags = Array.from(new Set([event.category, ...(event.interestTags || [])]));
      const overlapCount = allTags.filter((tag) => profile.interests.includes(tag)).length;
      const dotScore = Math.max(1, Math.min(5, overlapCount + (profile.interests.includes(event.category) ? 1 : 0)));
      const enriched = {
        id: `${slugify(city)}_${slugify(event.name)}_${offsetDays}`,
        city,
        name: event.name,
        emoji: event.emoji || DEFAULT_EVENT_EMOJIS[event.category] || "✨",
        category: event.category,
        dateTime: event.dateTime || upcomingDate(offsetDays, pickTimeForCategory(event.category, offsetDays)),
        neighborhood: event.neighborhood,
        venue: event.venue,
        description: event.description,
        interestTags: allTags,
        matchDots: dotScore,
        matchReason: overlapCount > 1 ? `${overlapCount} of your interests line up here` : `This fits your ${event.category.toLowerCase()} vibe`,
        signupLink: event.signupLink || "",
        cost: event.cost || categoryCost(event.category),
        address: eventAddressFor(event, city),
        signupUrl: signupUrlFor({ ...event, city })
      };
      return {
        ...enriched,
        publicStatsSeed: event.publicStatsSeed || createSeedPublicStats(enriched)

    function pickTimeForCategory(category, offsetDays) {
      const evening = ["Cooking", "Music", "Board Games", "Trivia", "Film", "Language Exchange", "Dance", "Coding", "Entrepreneurship", "Food & Drinks"];

      const midday = ["Art", "Photography", "Fitness", "Tennis", "Rock Climbing", "Reading"];
      if (evening.includes(category)) {
        return ["6:00 PM", "6:30 PM", "7:00 PM"][offsetDays % 3];
      }
      if (morning.includes(category)) {
        return ["8:00 AM", "9:00 AM", "10:00 AM"][offsetDays % 3];
      }
      if (midday.includes(category)) {
        return ["11:00 AM", "1:00 PM", "3:00 PM"][offsetDays % 3];
      }
      return "6:30 PM";
    }

    async function openAIRequest(payload) {
      const apiKey = getApiKey();
      if (!apiKey) throw new Error("Missing API key");

      const response = await fetch("https://api.openai.com/v1/responses", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(errorText || "OpenAI request failed");
      }

      return response.json();
    }

    function extractJSON(text) {
      if (!text) return null;
      const fenced = text.match(/```json\s*([\s\S]*?)```/i);
      const candidate = fenced ? fenced[1] : text;
      return JSON.parse(candidate.trim());
    }

    async function generateEventsWithOpenAI(profile) {
      const prompt = [
        "Generate exactly 12 realistic local events as JSON.",
        "Return ONLY a JSON array.",
        "Each object must include: name, emoji, category, dateTime, neighborhood, venue, address, description, interestTags, cost, signupUrl.",
        "description must be exactly 2 sentences.",
        "interestTags must be an array of 1-3 interests chosen from this list:",
        INTERESTS.join(", "),
        `City: ${profile.city}.`,
        `Age: ${profile.age}.`,
        `Interests: ${profile.interests.join(", ")}.`,
        `Why using Xplore: ${profile.reason}.`,
        "Make the events feel real and specific with plausible venues and neighborhoods.",
        "Dates should be in the next 30 days and formatted like 'Thu, Apr 18 • 6:30 PM'.",
        "address should be a plausible full street address.",
        "cost should be like 'Free', '$15', or '$20/month'.",
        "signupUrl should look like a plausible event signup page URL.",
        "Prioritize activities where people naturally talk while doing something.",
        "Do not include online events."
      ].join(" ");

      const data = await openAIRequest({
        model: "gpt-4.1-mini",
        input: prompt
      });

      const parsed = extractJSON(data.output_text);
      if (!Array.isArray(parsed) || parsed.length === 0) {
        throw new Error("No events returned");
      }

      const cityLabel = titleCaseCity(profile.city) || inferFallbackCity(profile.city);
      return parsed.slice(0, 12).map((event, index) => enrichEvent({
        name: event.name,
        emoji: event.emoji || DEFAULT_EVENT_EMOJIS[event.category],
        category: INTERESTS.includes(event.category) ? event.category : profile.interests[0] || "Food & Drinks",
        dateTime: event.dateTime,
        neighborhood: event.neighborhood || "Local favorite",
        venue: event.venue || "Neighborhood spot",
        address: event.address,
        description: event.description,
        interestTags: Array.isArray(event.interestTags) ? event.interestTags.filter((tag) => INTERESTS.includes(tag)) : [event.category],
        cost: event.cost,
        signupUrl: event.signupUrl
      }, profile, cityLabel, index + 2));
    }

    async function findSignupLink(event) {
      const data = await openAIRequest({
        model: "gpt-5",
        tools: [{ type: "web_search" }],
        input: `Find the most likely official signup or tickets page for this event. Return JSON only with keys url and summary. Event name: ${event.name}. Venue: ${event.venue}. Neighborhood: ${event.neighborhood}. City: ${event.city}. Date and time: ${event.dateTime}.`
      });
      const parsed = extractJSON(data.output_text);
      if (!parsed || !parsed.url) {
        throw new Error("No signup link found");
      }
      return parsed;
    }

    async function generateLearningSummary(profile, reviews, events) {
      const reviewedEntries = Object.entries(reviews).slice(-8).map(([eventId, review]) => {
        const event = events.find((item) => item.id === eventId);
        return {
          event: event ? event.name : "Recent event",
          category: event ? event.category : "Unknown",
          meetPeople: review.meetPeople,
          recommend: review.recommend,
          note: review.note || ""
        };
      });

      if (reviewedEntries.length < 3) return "";

      const apiKey = getApiKey();
      if (!apiKey) {
        const positive = reviewedEntries.filter((item) => item.meetPeople === "Yes" || item.recommend === "Yes");
        const grouped = {};
        positive.forEach((item) => {
          grouped[item.category] = (grouped[item.category] || 0) + 1;
        });
        const winners = Object.entries(grouped).sort((a, b) => b[1] - a[1]).slice(0, 2).map(([name]) => name);
        if (winners.length === 0) {
          return "You seem to enjoy events with a bit of structure and a clear activity, especially when the group feels welcoming and easy to rejoin.";
        }
        return `You tend to connect best at ${winners.join(" and ").toLowerCase()} events where the activity gives conversations an easy starting point. Smaller, repeat-friendly formats look like your strongest bet so far.`;
      }

      const data = await openAIRequest({
        model: "gpt-4.1-mini",
        input: [
          "Summarize this person's event preferences in 2 warm sentences.",
          "Write in second person.",
          "Focus on what types of events seem to help them connect best.",
          "Do not mention AI or data.",
          JSON.stringify(reviewedEntries)
        ].join(" ")
      });

      return data.output_text.trim();
    }

    function filteredDiscoverEvents() {
      return state.events.filter((event) => {

        return !skipped && !saved;

    function userReviewForAggregation(eventId) {
      const review = state.reviews[eventId];
      if (!review || !review.savedAt || !state.profile || !review.starRating) return null;
      const event = state.events.find((item) => item.id === eventId);
      return {
        starRating: Number(review.starRating),
        metPeople: review.meetPeople,
        recommend: review.recommend,
        publicSnippet: sanitizePublicSnippet(review.publicSnippet) || (event ? buildLocalAnonymousSnippet(event, review) : ""),
        ageBucket: ageBucket(state.profile.age),
        interests: state.profile.interests
      };
    }

    function aggregatePublicStats(event) {
      const seed = event.publicStatsSeed || createSeedPublicStats(event);
      const localReview = userReviewForAggregation(event.id);
      const ageBuckets = { ...seed.ageBuckets };
      const interestCounts = { ...seed.interestCounts };
      const snippets = [...(seed.snippets || [])];
      let count = seed.count || 0;
      let starSum = seed.starSum || 0;
      let metCount = seed.metCount || 0;
      let recommendCount = seed.recommendCount || 0;

      if (localReview) {
        count += 1;
        starSum += localReview.starRating;
        if (localReview.meetPeople === "Yes") metCount += 1;
        if (localReview.meetPeople === "Somewhat") metCount += 0.5;
        if (localReview.recommend === "Yes") recommendCount += 1;
        ageBuckets[localReview.ageBucket] = (ageBuckets[localReview.ageBucket] || 0) + 1;
        localReview.interests.forEach((interest) => {
          interestCounts[interest] = (interestCounts[interest] || 0) + 1;
        });
        if (localReview.publicSnippet) {
          snippets.unshift(localReview.publicSnippet);
        }
      }

      const topAgeRange = Object.entries(ageBuckets).sort((a, b) => b[1] - a[1])[0]?.[0] || "22-29";
      const topInterests = Object.entries(interestCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3)
        .map(([interest]) => interest);

      return {
        count,
        averageRating: count ? (starSum / count) : 0,
        metPercent: count ? Math.round((metCount / count) * 100) : 0,
        recommendPercent: count ? Math.round((recommendCount / count) * 100) : 0,
        topAgeRange,
        topInterests,
        snippets: snippets.filter(Boolean).slice(0, 4)
      };
    }

    function recommendedFromReviews() {
      const reviewEntries = Object.entries(state.reviews);
      if (!reviewEntries.length) return [];
      const positiveCategories = reviewEntries
        .map(([eventId, review]) => ({ event: state.events.find((item) => item.id === eventId), review }))
        .filter(({ event, review }) => event && (review.meetPeople === "Yes" || review.recommend === "Yes"))
        .map(({ event }) => event.category);
      const topCategory = positiveCategories.sort((a, b) =>
        positiveCategories.filter((value) => value === b).length - positiveCategories.filter((value) => value === a).length
      )[0];
      if (!topCategory) return [];
      return filteredDiscoverEvents().filter((event) => event.category === topCategory).slice(0, 3);
    }

    function maybeRefreshLearningSummary() {
      const reviewCount = Object.keys(state.reviews).length;

      return generateLearningSummary(state.profile, state.reviews, state.events)
        .then((summary) => {

    async function handleShare(eventId) {
      const event = state.events.find((item) => item.id === eventId);
      if (!event) return;
      const shareText = shareTextFor(event);
      const mobileLike = window.matchMedia("(max-width: 768px)").matches || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

      if (mobileLike && navigator.share) {
        try {
          await navigator.share({
            title: event.name,
            text: `${event.description}\n\nFound this on Xplore!\n\n${shareText}`
          });
          return;
        } catch (error) {
          if (error && error.name === "AbortError") return;
        }
      }

      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(shareText);
        } else {
          const helper = document.createElement("textarea");
          helper.value = shareText;
          document.body.appendChild(helper);
          helper.select();
          document.execCommand("copy");
          document.body.removeChild(helper);
        }
        showToast("Copied!");
      } catch (error) {
        showToast("Couldn't copy that share text just now.");
      }
    }

    async function regenerateEvents() {
      if (!state.profile) return;
      state.openaiLoading = true;
      render();
      try {
        const savedItems = state.events.filter((event) => state.uiState.saved[event.id]);
        const freshEvents = getApiKey()
          ? await generateEventsWithOpenAI(state.profile).catch(() => getHardcodedEvents(state.profile))
          : getHardcodedEvents(state.profile);
        const merged = [...savedItems];
        freshEvents.forEach((event) => {
          const duplicate = merged.some((item) => item.id === event.id || (item.name === event.name && item.venue === event.venue));
          if (!duplicate) merged.push(event);
        });
        state.events = merged;
        state.uiState.skippedIds = [];
        saveState();
        showToast(getApiKey() ? "Fresh event ideas are in." : "Refreshed your demo event set.");
      } finally {
        state.openaiLoading = false;
        render();
      }
    }

            ${savedMode ? "" : publicStatsMini(event)}

    function renderApp() {
      app.innerHTML = `
        <div class="app-shell">
          <div class="hero-orb left"></div>
          <div class="hero-orb right"></div>
          ${state.activeTab === "discover" ? discoverView() : ""}
          ${state.activeTab === "saved" ? savedView() : ""}
          ${state.activeTab === "history" ? historyView() : ""}
          ${state.activeTab === "preferences" ? preferencesView() : ""}
          <nav class="nav panel" aria-label="Main navigation">
            ${[
              ["discover", "🧭", "Discover"],
              ["saved", "🔖", "Saved"],
              ["history", "✅", "History"],
              ["preferences", "⚙️", "Preferences"]
            ].map(([id, icon, label]) => `
              <button data-nav="${id}" class="${state.activeTab === id ? "active" : ""}">
                <span class="icon" aria-hidden="true">${icon}</span>
                <span>${label}</span>
              </button>
            `).join("")}
          </nav>
          ${state.selectedEventId ? eventDetailModal() : ""}
        </div>
      `;

      app.querySelectorAll("[data-nav]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeTab = button.dataset.nav;
          state.selectedEventId = null;
          render();
        });
      });

      app.querySelectorAll("[data-tab-jump]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeTab = button.dataset.tabJump;
          state.selectedEventId = null;
          render();
        });
      });

      app.querySelectorAll("[data-event-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.dataset.eventId;
          if (button.dataset.eventAction === "interested") handleInterested(id);
          if (button.dataset.eventAction === "skip") handleSkip(id);
        });
      });

      app.querySelectorAll("[data-status-id]").forEach((button) => {
        button.addEventListener("click", () => updateStatus(button.dataset.statusId, button.dataset.statusValue));
      });

      app.querySelectorAll("[data-signup-id]").forEach((button) => {
        button.addEventListener("click", () => handleSignupLink(button.dataset.signupId));
      });

      app.querySelectorAll("[data-share-id]").forEach((button) => {
        button.addEventListener("click", () => handleShare(button.dataset.shareId));
      });

      app.querySelectorAll("[data-review-id]").forEach((button) => {
        button.addEventListener("click", () => updateReview(button.dataset.reviewId, { [button.dataset.reviewField]: button.dataset.reviewValue }));
      });

      app.querySelectorAll("[data-review-note]").forEach((textarea) => {
        textarea.addEventListener("input", () => updateReview(textarea.dataset.reviewNote, { note: textarea.value }, false));
      });

      app.querySelectorAll("[data-review-public-note]").forEach((textarea) => {
        textarea.addEventListener("input", () => updateReview(textarea.dataset.reviewPublicNote, { publicSnippet: textarea.value }, false));
      });

      app.querySelectorAll("[data-review-save]").forEach((button) => {
        button.addEventListener("click", () => submitReview(button.dataset.reviewSave));
      });

      app.querySelectorAll("[data-open-detail]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedEventId = button.dataset.openDetail;
          render();
        });
      });

      const closeDetail = document.getElementById("close-detail");
      if (closeDetail) {
        closeDetail.addEventListener("click", () => {
          state.selectedEventId = null;
          render();
        });
      }

      const detailOverlay = document.getElementById("detail-overlay");
      if (detailOverlay) {
        detailOverlay.addEventListener("click", (event) => {
          if (event.target.id === "detail-overlay") {
            state.selectedEventId = null;
            render();
          }
        });
      }

      app.querySelectorAll("[data-pref-interest]").forEach((button) => {
        button.addEventListener("click", () => togglePreferenceInterest(button.dataset.prefInterest));
      });

      const refreshMain = document.getElementById("refresh-events");
      if (refreshMain) refreshMain.addEventListener("click", regenerateEvents);
      const refreshInline = document.getElementById("refresh-events-inline");
      if (refreshInline) refreshInline.addEventListener("click", regenerateEvents);

      const savePrefs = document.getElementById("save-preferences");
      if (savePrefs) savePrefs.addEventListener("click", updatePreferences);
      const regenFeed = document.getElementById("regen-feed");
      if (regenFeed) regenFeed.addEventListener("click", regenerateEvents);
      const resetApp = document.getElementById("reset-app");
      if (resetApp) resetApp.addEventListener("click", resetAll);
    }

    function render() {
      if (!state.profile) {
        renderOnboarding();

    maybeRefreshLearningSummary().finally(render);
